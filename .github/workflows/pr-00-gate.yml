# -----------------------------------------------------------------------------
# Gate Workflow — Consumer Repository Template
# -----------------------------------------------------------------------------
# Orchestrates CI enforcement for pull requests. The `summary` job aggregates
# results and publishes the commit status that keepalive automation relies on.
#
# USAGE:
#   - Standard Python projects: Use this template as-is
#   - Custom projects: Use as a STARTING POINT, customize the test job(s)
#
# IMPORTANT: The `summary` job and `Gate / gate` commit status are REQUIRED
# for keepalive automation to detect CI results. Do not remove or rename them.
#
# SYNC BEHAVIOR:
#   - This file is NOT auto-synced to repos with custom Gate workflows
#   - Repos in CUSTOM_GATE_REPOS list in maint-68-sync-consumer-repos.yml
#     maintain their own Gate and should update manually if needed
#
# Copy this file to: .github/workflows/pr-00-gate.yml
#
# Required secrets: None (uses GITHUB_TOKEN)
# Optional secrets: Passed via `secrets: inherit` to reusable workflow
#
# Examples of custom Gates based on this template:
#   - stranske/trip-planner (Flask + requirements.txt)
#   - stranske/Manager-Database (FastAPI + docker-compose)
# -----------------------------------------------------------------------------

name: Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  workflow_dispatch:

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref_name }}-gate
  cancel-in-progress: true

jobs:
  detect:
    name: classify changed paths
    runs-on: ubuntu-latest
    outputs:
      is_docs_only: ${{ steps.classify.outputs.is-docs-only || 'false' }}
      is_python_code: ${{ steps.classify.outputs.is-python-code || 'true' }}
      is_workflow_change: ${{ steps.classify.outputs.is-workflow-change || 'false' }}
      is_security_relevant: ${{ steps.classify.outputs.is-security-relevant || 'true' }}
      classification_rationale: ${{ steps.classify.outputs.classification-rationale || 'path classifier unavailable' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Classify changed paths
        id: classify
        uses: ./.github/actions/path-classifier
        with:
          force-full: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'verify:full') || github.event_name == 'schedule' }}

  python-ci:
    name: Python CI
    needs: detect
    if: >-
      ${{
        needs.detect.outputs.is_docs_only != 'true' &&
        needs.detect.outputs.is_python_code == 'true'
      }}
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      coverage-min: "80"
      format_check: false  # Using ruff for formatting
      working-directory: "."
      artifact-prefix: "gate-"
      # Enable soft coverage gate for trend tracking and hotspot reporting
      enable-soft-gate: true
    secrets: inherit

  orchestration-tests:
    name: Orchestration Tests (LangGraph)
    needs: detect
    if: >-
      ${{
        needs.detect.outputs.is_docs_only != 'true' &&
        needs.detect.outputs.is_python_code == 'true'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies with orchestration extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[orchestration,dev]"

      - name: Run LangGraph orchestration tests
        run: |
          # This job is intentionally scoped to the LangGraph execution path.
          # Broader orchestration coverage stays in the main Python test suite.
          pytest tests/orchestration_graph_test.py tests/python/test_langgraph_orchestration.py -v

  cross-repo-smoke:
    # Gates the planner integration contract against a pinned trip-planner ref.
    # See docs/local-testing-plan.md "Stage 7" and the matching trip-planner job
    # for how to advance TRIP_PLANNER_PINNED_REF as a coordinated pair.
    name: Cross-Repo Smoke (trip-planner)
    needs: detect
    if: ${{ needs.detect.outputs.is_docs_only != 'true' }}
    runs-on: ubuntu-latest
    env:
      TPP_BASE_URL: http://127.0.0.1:8000
      TPP_OIDC_PROVIDER: google
      TPP_AUTH_MODE: bootstrap-token
      TPP_PORT: "8000"
    steps:
      - name: Checkout Travel-Plan-Permission (PR head)
        uses: actions/checkout@v6
        with:
          path: travel-plan-permission

      - name: Load TRIP_PLANNER_PINNED_REF from single-source pin file
        # Single source of truth for the trip-planner ref this job exercises.
        # Bump in lockstep with the corresponding trip-planner CI job pin
        # by editing .github/trip-planner-pinned-ref only.
        working-directory: travel-plan-permission
        run: |
          pin_file=".github/trip-planner-pinned-ref"

          if [ ! -f "${pin_file}" ]; then
            echo "Pin file ${pin_file} does not exist" >&2
            exit 1
          fi

          if [ ! -r "${pin_file}" ]; then
            echo "Pin file ${pin_file} is not readable" >&2
            exit 1
          fi

          ref="$(tr -d '[:space:]' < "${pin_file}")"
          if [ -z "${ref}" ]; then
            echo "Pin file ${pin_file} is empty or contains only whitespace" >&2
            exit 1
          fi

          if ! printf '%s\n' "${ref}" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "Pin file ${pin_file} must contain exactly one 40-character hexadecimal commit SHA" >&2
            exit 1
          fi

          echo "TRIP_PLANNER_PINNED_REF=${ref}" >> "$GITHUB_ENV"

      - name: Checkout trip-planner at pinned ref
        uses: actions/checkout@v6
        with:
          repository: stranske/trip-planner
          ref: ${{ env.TRIP_PLANNER_PINNED_REF }}
          path: trip-planner

      - name: Log resolved trip-planner SHA
        working-directory: trip-planner
        run: |
          echo "TRIP_PLANNER_PINNED_REF input: ${TRIP_PLANNER_PINNED_REF}"
          echo "Resolved SHA: $(git rev-parse HEAD)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Travel-Plan-Permission dev extras
        working-directory: travel-plan-permission
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,orchestration]"

      - name: Generate bootstrap signing secret
        run: |
          secret="$(python -c 'import secrets; print(secrets.token_hex(32))')"
          echo "TPP_BOOTSTRAP_SIGNING_SECRET=${secret}" >> "$GITHUB_ENV"

      - name: Mint planner bootstrap token
        working-directory: travel-plan-permission
        run: |
          token="$(tpp-planner-token --subject ci-gate-cross-repo-smoke)"
          if [ -z "${token}" ]; then
            echo "tpp-planner-token returned empty token" >&2
            exit 1
          fi
          echo "TPP_PLANNER_TOKEN=${token}" >> "$GITHUB_ENV"

      - name: Start tpp-planner-service in background
        working-directory: travel-plan-permission
        run: |
          mkdir -p "${{ github.workspace }}/_runtime"
          nohup tpp-planner-service --host 127.0.0.1 --port "${TPP_PORT}" \
            >"${{ github.workspace }}/_runtime/planner-service.log" 2>&1 &
          echo "PLANNER_SERVICE_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /readyz to return 200
        run: |
          for attempt in $(seq 1 60); do
            status="$(curl -s -o /dev/null -w '%{http_code}' "${TPP_BASE_URL}/readyz" || echo '000')"
            if [ "${status}" = "200" ]; then
              echo "Planner service ready after ${attempt} attempt(s)."
              exit 0
            fi
            sleep 1
          done
          echo "Planner service never reported ready." >&2
          tail -n 200 "${{ github.workspace }}/_runtime/planner-service.log" >&2 || true
          exit 1

      - name: Run tpp-cross-repo-smoke
        working-directory: travel-plan-permission
        env:
          TRIP_PLANNER_REPO: ${{ github.workspace }}/trip-planner
        run: |
          tpp-cross-repo-smoke

      - name: Run tpp-planner-smoke
        working-directory: travel-plan-permission
        run: |
          tpp-planner-smoke --token "${TPP_PLANNER_TOKEN}"

      - name: Tear down planner service
        if: always()
        run: |
          if [ -n "${PLANNER_SERVICE_PID:-}" ] && kill -0 "${PLANNER_SERVICE_PID}" 2>/dev/null; then
            kill "${PLANNER_SERVICE_PID}" || true
            for _ in $(seq 1 5); do
              kill -0 "${PLANNER_SERVICE_PID}" 2>/dev/null || break
              sleep 1
            done
            kill -9 "${PLANNER_SERVICE_PID}" 2>/dev/null || true
          fi

      - name: Upload planner service log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gate-planner-service-log
          path: ${{ github.workspace }}/_runtime/planner-service.log
          if-no-files-found: ignore

  summary:
    name: gate-summary
    needs: [detect, python-ci, orchestration-tests, cross-repo-smoke]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    outputs:
      state: ${{ steps.summarize.outputs.state }}
      description: ${{ steps.summarize.outputs.description }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Summarize results
        id: summarize
        env:
          DETECT_RESULT: ${{ needs.detect.result || 'skipped' }}
          PYTHON_RESULT: ${{ needs.python-ci.result || 'skipped' }}
          ORCHESTRATION_RESULT: ${{ needs.orchestration-tests.result || 'skipped' }}
          CROSS_REPO_SMOKE_RESULT: ${{ needs.cross-repo-smoke.result || 'skipped' }}
        run: |
          set -euo pipefail

          python_result="${PYTHON_RESULT:-skipped}"
          orchestration_result="${ORCHESTRATION_RESULT:-skipped}"
          cross_repo_smoke_result="${CROSS_REPO_SMOKE_RESULT:-skipped}"

          # Collect failures and cancellations across all gate jobs.
          failed_desc=""
          cancelled_desc=""

          [[ "${python_result}" == "failure" ]] && \
            failed_desc="${failed_desc:+${failed_desc}; }Python CI failed"
          [[ "${orchestration_result}" == "failure" ]] && \
            failed_desc="${failed_desc:+${failed_desc}; }orchestration tests failed"
          [[ "${cross_repo_smoke_result}" == "failure" ]] && \
            failed_desc="${failed_desc:+${failed_desc}; }cross-repo smoke failed"

          [[ "${python_result}" == "cancelled" ]] && \
            cancelled_desc="${cancelled_desc:+${cancelled_desc}; }Python CI cancelled"
          [[ "${orchestration_result}" == "cancelled" ]] && \
            cancelled_desc="${cancelled_desc:+${cancelled_desc}; }orchestration tests cancelled"
          [[ "${cross_repo_smoke_result}" == "cancelled" ]] && \
            cancelled_desc="${cancelled_desc:+${cancelled_desc}; }cross-repo smoke cancelled"

          if [[ -n "${failed_desc}" ]]; then
            state="failure"
            description="${failed_desc}"
          elif [[ -n "${cancelled_desc}" ]]; then
            state="error"
            description="${cancelled_desc}"
          elif [[ ("${python_result}" == "success" || "${python_result}" == "skipped") && \
                  ("${orchestration_result}" == "success" || "${orchestration_result}" == "skipped") && \
                  ("${cross_repo_smoke_result}" == "success" || "${cross_repo_smoke_result}" == "skipped") ]]; then
            state="success"
            description="All checks passed"
          else
            state="pending"
            description="Gate status pending (python=${python_result}, orchestration=${orchestration_result}, cross-repo-smoke=${cross_repo_smoke_result})"
          fi

          detect_result="${DETECT_RESULT:-skipped}"
          if [[ "${detect_result}" != "success" ]]; then
            if [[ "${detect_result}" == "failure" ]]; then
              state="failure"
              description="Path classification failed"
            elif [[ "${detect_result}" == "cancelled" ]]; then
              state="error"
              description="Path classification was cancelled"
            else
              state="pending"
              description="Path classification status unknown"
            fi
          fi

          echo "state=${state}" >> "$GITHUB_OUTPUT"
          echo "description=${description}" >> "$GITHUB_OUTPUT"
          echo "[Gate] State: ${state}, Description: ${description}"

      - name: Report Gate commit status
        if: ${{ always() }}
        uses: actions/github-script@v9.0.0
        env:
          STATE: ${{ steps.summarize.outputs.state || 'pending' }}
          DESCRIPTION: ${{ steps.summarize.outputs.description || 'Gate status pending' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request?.head?.sha ?? context.sha;
            const rawState = process.env.STATE || 'pending';
            const allowed = new Set(['error', 'failure', 'pending', 'success']);
            const state = allowed.has(rawState) ? rawState : 'pending';
            const rawDescription = process.env.DESCRIPTION || 'Gate status update';
            const description = rawDescription.length > 140 ? `${rawDescription.slice(0, 137)}...` : rawDescription;
            const targetUrl = process.env.TARGET_URL;

            try {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha,
                state,
                context: 'Gate / gate',
                description,
                target_url: targetUrl,
              });
              console.log(`Created commit status: ${state} - ${description}`);
            } catch (error) {
              const hitRateLimit = error?.status === 403 && /rate limit/i.test(error?.message || '');
              if (hitRateLimit) {
                core.warning('Rate limit prevented Gate from updating the commit status.');
              } else {
                throw error;
              }
            }

      - name: Enforce Gate success
        if: ${{ steps.summarize.outputs.state == 'failure' }}
        run: |
          echo "Gate reported failure: ${{ steps.summarize.outputs.description }}" >&2
          exit 1
