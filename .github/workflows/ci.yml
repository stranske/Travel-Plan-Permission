# Thin caller for Python CI - delegates to Workflows repo reusable workflow
# No local scripts required - all logic is centralized in stranske/Workflows
#
# This workflow runs:
# - Lint (Ruff)
# - Format check (Black)
# - Type checking (mypy)
# - Tests (pytest) on Python 3.12 and 3.13
#
# NOTE: Do NOT add a top-level 'permissions:' block here. It causes
# startup_failure when calling reusable workflows. The reusable workflow
# defines its own permissions.
#
# Copy this file to: .github/workflows/ci.yml
# Also copy: autofix-versions.env to .github/workflows/autofix-versions.env
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python CI
    uses: stranske/Workflows/.github/workflows/reusable-10-ci-python.yml@main
    with:
      python-versions: '["3.12", "3.13"]'
      typecheck: true
      coverage: true
      coverage-min: '80'
    secrets: inherit

  orchestration:
    name: LangGraph Orchestration CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies with orchestration extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[orchestration,dev]"

      - name: Run LangGraph orchestration tests
        run: |
          pytest \
            tests/orchestration_graph_test.py \
            tests/python/test_langgraph_orchestration.py \
            tests/python/test_orchestration_smoke.py::test_policy_graph_langgraph_smoke \
            tests/python/test_orchestration_smoke.py::test_policy_graph_prefers_langgraph_when_available \
            -v
